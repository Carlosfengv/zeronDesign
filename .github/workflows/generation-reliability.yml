name: Generation Reliability

"on":
  pull_request:
    paths:
      - "services/runtime/**"
      - "services/provider-gateway/**"
      - "infra/agent-sandbox/**"
      - "infra/provider-gateway/**"
      - "infra/generation-reliability/**"
      - ".github/workflows/generation-reliability.yml"
  push:
    branches:
      - main
    paths:
      - "services/runtime/**"
      - "services/provider-gateway/**"
      - "infra/agent-sandbox/**"
      - "infra/provider-gateway/**"
      - "infra/generation-reliability/**"
      - ".github/workflows/generation-reliability.yml"
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:
    inputs:
      provider_mode:
        description: Provider used by the deployed Website/Docs matrix
        required: true
        default: fixture
        type: choice
        options:
          - fixture
          - real

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify generation gate contract
        run: bash infra/generation-reliability/check-contract.sh
      - name: Verify Run token budgets
        env:
          RUST_MIN_STACK: "8388608"
        run: cargo test --manifest-path services/runtime/Cargo.toml --test agent_loop token_budget
      - name: Verify protocol fuse
        env:
          RUST_MIN_STACK: "8388608"
        run: cargo test --manifest-path services/runtime/Cargo.toml --test agent_loop protocol
      - name: Verify failed Candidate repair convergence
        run: |
          cargo test --manifest-path services/runtime/Cargo.toml --test sandbox_tools \
            preview_publish_rejects_unchanged_source_after_failed_generation_validation -- --exact
          cargo test --manifest-path services/runtime/Cargo.toml --test sandbox_tools \
            preview_publish_rejects_candidate_that_fails_frozen_brief_acceptance -- --exact
      - name: Verify persisted Run WAL hot path
        run: |
          cargo test --manifest-path services/runtime/Cargo.toml --test checkpoint \
            persisted_runs_are_hydrated_once_per_store_instance -- --exact
          cargo test --manifest-path services/runtime/Cargo.toml --test checkpoint \
            truncated_run_wal_tail_is_repaired_before_restart_continues_writing -- --exact
      - name: Verify production Candidate promotion boundary
        run: >-
          cargo test --manifest-path services/runtime/Cargo.toml --test preview_promotion
          production_retires_manual_candidate_reporting_before_it_can_promote
      - name: Verify Provider usage boundary
        run: >-
          cargo test --manifest-path services/runtime/Cargo.toml --test model_gateway
          runtime_gateway_provider_round_trip_preserves_governed_selection_boundary

  fixture-k3d:
    if: >-
      github.event_name != 'pull_request' &&
      (github.event_name != 'schedule' || vars.ENABLE_SCHEDULED_REAL_PROVIDER != 'true') &&
      (github.event_name != 'workflow_dispatch' || inputs.provider_mode != 'real')
    needs: contracts
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pinned k3d
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/k3d-io/k3d/releases/download/v5.8.3/k3d-linux-amd64 \
            --output /tmp/k3d
          chmod +x /tmp/k3d
          sudo mv /tmp/k3d /usr/local/bin/k3d
          k3d version
      - name: Locate Chromium
        run: |
          browser="$(command -v google-chrome || command -v chromium || command -v chromium-browser)"
          test -x "${browser}"
          printf 'RUNTIME_BROWSER_EXECUTABLE=%s\n' "${browser}" >>"${GITHUB_ENV}"
      - name: Run Website and Docs fixture matrix
        env:
          GENERATION_MATRIX_MODE: fixture
          GENERATION_MATRIX_BOOTSTRAP: always
          GENERATION_MATRIX_SKIP_PREFLIGHT: "1"
          GENERATION_MATRIX_EVIDENCE_DIR: services/runtime/target/e2e-evidence/ci-fixture
        run: bash infra/generation-reliability/run-k3d-matrix.sh
      - name: Upload generation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generation-fixture-evidence
          path: services/runtime/target/e2e-evidence/ci-fixture
          if-no-files-found: error

  real-provider-k3d:
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.provider_mode == 'real') ||
      (github.event_name == 'schedule' && vars.ENABLE_SCHEDULED_REAL_PROVIDER == 'true')
    needs: contracts
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pinned k3d
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/k3d-io/k3d/releases/download/v5.8.3/k3d-linux-amd64 \
            --output /tmp/k3d
          chmod +x /tmp/k3d
          sudo mv /tmp/k3d /usr/local/bin/k3d
          k3d version
      - name: Locate Chromium
        run: |
          browser="$(command -v google-chrome || command -v chromium || command -v chromium-browser)"
          test -x "${browser}"
          printf 'RUNTIME_BROWSER_EXECUTABLE=%s\n' "${browser}" >>"${GITHUB_ENV}"
      - name: Bootstrap governed Runtime cluster with fixture matrix
        env:
          GENERATION_MATRIX_MODE: fixture
          GENERATION_MATRIX_BOOTSTRAP: always
          GENERATION_MATRIX_SKIP_PREFLIGHT: "1"
          GENERATION_MATRIX_EVIDENCE_DIR: services/runtime/target/e2e-evidence/ci-real/bootstrap
        run: bash infra/generation-reliability/run-k3d-matrix.sh
      - name: Build and import Provider Gateway image
        run: |
          gateway_image="zerondesign/provider-gateway:ci-${GITHUB_RUN_ID}"
          docker build --tag "${gateway_image}" services/provider-gateway
          k3d image import --cluster zerondesign-e2e "${gateway_image}"
          printf 'PROVIDER_GATEWAY_IMAGE=%s\n' "${gateway_image}" >>"${GITHUB_ENV}"
      - name: Install credential-backed Provider Gateway
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          test -n "${DEEPSEEK_API_KEY}"
          kubectl create namespace provider-system --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f infra/provider-gateway/service-account.yaml
          kubectl apply -f infra/provider-gateway/service.yaml
          secret_dir="$(mktemp -d)"
          trap 'rm -rf "${secret_dir}"' EXIT
          umask 077
          printf '%s' "${DEEPSEEK_API_KEY}" >"${secret_dir}/api-key"
          openssl rand -hex 32 >"${secret_dir}/runtime-token"
          kubectl create secret generic deepseek-v4-pro-api -n provider-system \
            --from-file="api-key=${secret_dir}/api-key" --dry-run=client -o yaml | kubectl apply -f -
          for namespace in provider-system anydesign-runtime; do
            kubectl create secret generic provider-gateway-runtime-auth -n "${namespace}" \
              --from-file="MODEL_GATEWAY_AUTH_TOKEN=${secret_dir}/runtime-token" \
              --dry-run=client -o yaml | kubectl apply -f -
          done
          PROVIDER_GATEWAY_IMAGE="${PROVIDER_GATEWAY_IMAGE}" \
            bash infra/provider-gateway/apply-k3d-persistent-sqlite.sh
      - name: Run governed real-provider Website and Docs suite
        env:
          DEEPSEEK_E2E_MODEL: ${{ vars.DEEPSEEK_E2E_MODEL || 'deepseek-v4-pro' }}
          GENERATION_REAL_CLUSTER: zerondesign-e2e
          GENERATION_REAL_WORKSPACE_NAMESPACE: ws-runtime-rc
          GENERATION_REAL_EVIDENCE_DIR: services/runtime/target/e2e-evidence/ci-real/real-provider-runs
          GENERATION_REAL_PROVIDER_READINESS_PROBE: "1"
        run: bash infra/generation-reliability/run-real-provider-examples.sh
      - name: Upload generation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generation-real-provider-evidence-${{ github.run_id }}
          path: services/runtime/target/e2e-evidence/ci-real
          if-no-files-found: error
