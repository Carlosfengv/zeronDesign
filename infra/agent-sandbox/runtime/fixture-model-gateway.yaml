apiVersion: apps/v1
kind: Deployment
metadata:
  name: fixture-model-gateway
  namespace: anydesign-runtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fixture-model-gateway
  template:
    metadata:
      labels:
        app: fixture-model-gateway
    spec:
      containers:
        - name: gateway
          image: node:22-bookworm
          imagePullPolicy: IfNotPresent
          command: ["node", "/fixture/fixture-model-gateway.js"]
          ports:
            - name: http
              containerPort: 9000
          readinessProbe:
            httpGet:
              path: /health
              port: http
          volumeMounts:
            - name: script
              mountPath: /fixture
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: script
          configMap:
            name: fixture-model-gateway
---
apiVersion: v1
kind: Service
metadata:
  name: fixture-model-gateway
  namespace: anydesign-runtime
spec:
  selector:
    app: fixture-model-gateway
  ports:
    - name: http
      port: 9000
      targetPort: http
