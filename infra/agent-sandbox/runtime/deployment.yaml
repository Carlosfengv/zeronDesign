apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: anydesign-runtime-storage
  namespace: anydesign-runtime
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anydesign-runtime
  namespace: anydesign-runtime
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: anydesign-runtime
  template:
    metadata:
      labels:
        app: anydesign-runtime
    spec:
      serviceAccountName: anydesign-runtime
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: runtime
          image: anydesign/runtime:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: MODEL_PROVIDER
              value: internal_gateway
            - name: MODEL_REQUEST_TIMEOUT_SECONDS
              value: "390"
            - name: RUNTIME_AGENT_MAX_TURNS
              value: "20"
            - name: RUNTIME_AGENT_MAX_TOOL_CALLS
              value: "60"
            - name: RUNTIME_AGENT_MAX_INPUT_TOKENS
              value: "200000"
            - name: RUNTIME_AGENT_MAX_OUTPUT_TOKENS
              value: "40000"
            - name: RUNTIME_AGENT_MAX_CONSECUTIVE_PROTOCOL_ERRORS
              value: "3"
            - name: RUNTIME_AGENT_TOTAL_TIMEOUT_SECONDS
              value: "1800"
            - name: RUNTIME_AGENT_IDLE_TIMEOUT_SECONDS
              value: "420"
            - name: RUNTIME_AGENT_MAX_NO_PROGRESS_TURNS
              value: "5"
            - name: RUNTIME_AGENT_MAX_READ_TOOL_CALLS
              value: "36"
            - name: RUNTIME_AGENT_MAX_SEARCH_TOOL_CALLS
              value: "8"
            - name: RUNTIME_AGENT_MAX_REPAIR_READ_TOOL_CALLS
              value: "6"
            - name: RUNTIME_AGENT_MAX_REPAIR_SEARCH_TOOL_CALLS
              value: "2"
            - name: RUNTIME_TOOL_CALL_DEADLINE_MS
              value: "120000"
            - name: RUNTIME_BUILD_TOOL_CALL_DEADLINE_MS
              value: "300000"
            - name: RUNTIME_MAX_ACCEPTANCE_REPAIR_CYCLES
              value: "3"
            - name: SANDBOX_BACKEND_MODE
              value: kubernetes
            - name: RUNTIME_POLICY_PROFILE
              value: production
            - name: PUBLIC_PRINCIPAL_AUTH_MODE
              value: required
            - name: PUBLIC_PRINCIPAL_PUBLIC_KEY_FILES
              value: /var/run/anydesign/public-principal/public.der
            - name: PUBLIC_PRINCIPAL_MAX_TTL_SECONDS
              value: "120"
            - name: RUNTIME_INTERNAL_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: anydesign-runtime-internal-admin
                  key: token
            - name: K8S_NAMESPACE
              value: anydesign-sandboxes
            - name: RUNTIME_EXECUTION_PROFILE_READINESS_MODE
              value: kubernetes
            - name: RUNTIME_EXECUTION_PROFILE_READINESS_TTL_SECONDS
              value: "15"
            - name: RUNTIME_PUBLIC_BASE_URL
              value: http://anydesign-runtime.anydesign-runtime.svc.cluster.local:8080
            - name: RUNTIME_STORAGE_DIR
              value: /var/lib/anydesign-runtime/data
            - name: WORKSPACE_CHANNEL_SIGNING_KEY_FILE
              value: /var/run/anydesign/signer/private.der
            - name: WORKSPACE_CHANNEL_TLS_MODE
              value: required
            - name: WORKSPACE_CHANNEL_CA_FILE
              value: /var/run/anydesign/workspace-channel-tls/ca.crt
            - name: WORKSPACE_CHANNEL_CLIENT_CERT_FILE
              value: /var/run/anydesign/workspace-channel-tls/tls.crt
            - name: WORKSPACE_CHANNEL_CLIENT_KEY_FILE
              value: /var/run/anydesign/workspace-channel-tls/tls.key
            - name: WORKSPACE_CHANNEL_SERVER_SAN
              value: spiffe://anydesign.local/ns/anydesign-sandboxes/sa/anydesign-sandbox
            - name: RUNTIME_NPM_REGISTRY
              value: http://anydesign-npm-proxy.anydesign-runtime.svc.cluster.local:4873/
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 2
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: storage
              mountPath: /var/lib/anydesign-runtime/data
            - name: signer
              mountPath: /var/run/anydesign/signer
              readOnly: true
            - name: workspace-channel-tls
              mountPath: /var/run/anydesign/workspace-channel-tls
              readOnly: true
            - name: public-principal
              mountPath: /var/run/anydesign/public-principal
              readOnly: true
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: anydesign-runtime-storage
        - name: signer
          secret:
            secretName: anydesign-workspace-channel-signer
        - name: workspace-channel-tls
          secret:
            secretName: anydesign-runtime-channel-client
        - name: public-principal
          secret:
            secretName: anydesign-runtime-public-principal
---
apiVersion: v1
kind: Service
metadata:
  name: anydesign-runtime
  namespace: anydesign-runtime
spec:
  selector:
    app: anydesign-runtime
  ports:
    - name: http
      port: 8080
      targetPort: http
