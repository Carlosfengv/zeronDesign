apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: anydesign-runtime-storage
  namespace: anydesign-runtime
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anydesign-runtime
  namespace: anydesign-runtime
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: anydesign-runtime
  template:
    metadata:
      labels:
        app: anydesign-runtime
        anydesign.io/runtime-role: primary
    spec:
      serviceAccountName: anydesign-runtime
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: runtime
          image: anydesign/runtime:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: MODEL_PROVIDER
              value: internal_gateway
            - name: MODEL_REQUEST_TIMEOUT_SECONDS
              value: "390"
            - name: RUNTIME_AGENT_MAX_TURNS
              value: "20"
            - name: RUNTIME_AGENT_MAX_TOOL_CALLS
              value: "60"
            - name: RUNTIME_AGENT_MAX_INPUT_TOKENS
              value: "200000"
            - name: RUNTIME_AGENT_TOKEN_BUDGET_MODE
              value: "legacy"
            - name: RUNTIME_AGENT_PHASE_BUDGET_MODE
              value: shadow
            - name: RUNTIME_AGENT_PHASE_BRIEF_MAX_GROSS_INPUT_TOKENS
              value: "80000"
            - name: RUNTIME_AGENT_PHASE_BRIEF_MAX_UNCACHED_INPUT_TOKENS
              value: "40000"
            - name: RUNTIME_AGENT_PHASE_BRIEF_MAX_PROMPT_TOKENS_PER_TURN
              value: "24000"
            - name: RUNTIME_AGENT_PHASE_BRIEF_MAX_TURNS
              value: "6"
            - name: RUNTIME_AGENT_PHASE_BUILD_MAX_GROSS_INPUT_TOKENS
              value: "300000"
            - name: RUNTIME_AGENT_PHASE_BUILD_MAX_UNCACHED_INPUT_TOKENS
              value: "180000"
            - name: RUNTIME_AGENT_PHASE_BUILD_MAX_PROMPT_TOKENS_PER_TURN
              value: "64000"
            - name: RUNTIME_AGENT_PHASE_BUILD_MAX_TURNS
              value: "16"
            - name: RUNTIME_AGENT_PHASE_EDIT_MAX_GROSS_INPUT_TOKENS
              value: "220000"
            - name: RUNTIME_AGENT_PHASE_EDIT_MAX_UNCACHED_INPUT_TOKENS
              value: "120000"
            - name: RUNTIME_AGENT_PHASE_EDIT_MAX_PROMPT_TOKENS_PER_TURN
              value: "48000"
            - name: RUNTIME_AGENT_PHASE_EDIT_MAX_TURNS
              value: "12"
            - name: RUNTIME_AGENT_PHASE_REPAIR_MAX_GROSS_INPUT_TOKENS
              value: "180000"
            - name: RUNTIME_AGENT_PHASE_REPAIR_MAX_UNCACHED_INPUT_TOKENS
              value: "100000"
            - name: RUNTIME_AGENT_PHASE_REPAIR_MAX_PROMPT_TOKENS_PER_TURN
              value: "48000"
            - name: RUNTIME_AGENT_PHASE_REPAIR_MAX_TURNS
              value: "10"
            - name: RUNTIME_AGENT_MAX_GROSS_INPUT_TOKENS
              value: "300000"
            - name: RUNTIME_AGENT_MAX_UNCACHED_INPUT_TOKENS
              value: "180000"
            - name: RUNTIME_AGENT_MAX_PROMPT_TOKENS_PER_TURN
              value: "64000"
            - name: RUNTIME_AGENT_OPERATION_BUDGET_MODE
              value: shadow
            - name: RUNTIME_AGENT_CONTINUATION_MODE
              value: shadow
            - name: RUNTIME_AGENT_CONTINUATION_ALLOWLIST_JSON
              value: "[]"
            - name: RUNTIME_AGENT_MAX_OPERATION_GROSS_INPUT_TOKENS
              value: "450000"
            - name: RUNTIME_AGENT_MAX_OPERATION_UNCACHED_INPUT_TOKENS
              value: "270000"
            - name: RUNTIME_AGENT_MAX_OPERATION_OUTPUT_TOKENS
              value: "80000"
            - name: RUNTIME_AGENT_MAX_OPERATION_TURNS
              value: "30"
            - name: RUNTIME_AGENT_MAX_OPERATION_TOOL_CALLS
              value: "100"
            - name: RUNTIME_AGENT_WORKFLOW_DRIVER_MODE
              value: enforced
            - name: RUNTIME_AGENT_WORKFLOW_DRIVER_MAX_ACTIONS
              value: "8"
            - name: RUNTIME_AGENT_WORKFLOW_DRIVER_WAIT_TIMEOUT_MS
              value: "30000"
            - name: RUNTIME_AGENT_WORKFLOW_DRIVER_POLL_INTERVAL_MS
              value: "500"
            - name: RUNTIME_AGENT_MAX_OUTPUT_TOKENS
              value: "40000"
            - name: RUNTIME_AGENT_MAX_CONSECUTIVE_PROTOCOL_ERRORS
              value: "3"
            - name: RUNTIME_AGENT_TOTAL_TIMEOUT_SECONDS
              value: "1800"
            - name: RUNTIME_AGENT_IDLE_TIMEOUT_SECONDS
              value: "420"
            - name: RUNTIME_AGENT_MAX_NO_PROGRESS_TURNS
              value: "5"
            - name: RUNTIME_AGENT_MAX_READ_TOOL_CALLS
              value: "36"
            - name: RUNTIME_AGENT_MAX_SEARCH_TOOL_CALLS
              value: "8"
            - name: RUNTIME_AGENT_MAX_REPAIR_READ_TOOL_CALLS
              value: "6"
            - name: RUNTIME_AGENT_MAX_REPAIR_SEARCH_TOOL_CALLS
              value: "2"
            - name: RUNTIME_TOOL_CALL_DEADLINE_MS
              value: "120000"
            - name: RUNTIME_BUILD_TOOL_CALL_DEADLINE_MS
              value: "300000"
            - name: RUNTIME_MAX_ACCEPTANCE_REPAIR_CYCLES
              value: "3"
            - name: SANDBOX_BACKEND_MODE
              value: kubernetes
            - name: RUNTIME_POLICY_PROFILE
              value: production
            - name: RUNTIME_GENERATION_CONTEXT_MODE
              value: shadow
            - name: RUNTIME_CONTENT_PLAN_ATTESTATION_MODE
              value: shadow
            - name: RUNTIME_CONTENT_PLAN_APPROVAL_PRODUCER_REQUIRED
              value: "false"
            - name: RUNTIME_OBSERVATION_RECEIPTS_ENABLED
              value: "true"
            - name: PUBLIC_PRINCIPAL_AUTH_MODE
              value: required
            - name: PUBLIC_PRINCIPAL_PUBLIC_KEY_FILES
              value: /var/run/anydesign/public-principal/public.der
            - name: PUBLIC_PRINCIPAL_MAX_TTL_SECONDS
              value: "120"
            - name: RUNTIME_INTERNAL_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: anydesign-runtime-internal-admin
                  key: token
            - name: RUNTIME_EXECUTION_PROFILE_READINESS_MODE
              # Workspace provisioning owns the namespace-scoped template and
              # pool readiness contract. Runtime has no safe global tenant
              # Namespace to probe; the actual SandboxClaim still fails closed.
              value: static
            - name: RUNTIME_EXECUTION_PROFILE_READINESS_TTL_SECONDS
              value: "15"
            - name: RUNTIME_PUBLIC_BASE_URL
              value: http://anydesign-runtime.anydesign-runtime.svc.cluster.local:8080
            - name: RUNTIME_STORAGE_DIR
              value: /var/lib/anydesign-runtime/data
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: anydesign-runtime-postgres
                  key: url
            - name: OBJECT_STORAGE_URL
              value: s3://anydesign-runtime/greenfield
            - name: OBJECT_STORAGE_ENDPOINT
              value: http://anydesign-object-store.anydesign-runtime.svc.cluster.local:9000
            - name: OBJECT_STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: anydesign-runtime-object-storage
                  key: access-key
            - name: OBJECT_STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: anydesign-runtime-object-storage
                  key: secret-key
            - name: OBJECT_STORAGE_REGION
              value: us-east-1
            - name: OBJECT_STORAGE_ALLOW_HTTP
              value: "true"
            - name: WORKSPACE_CHANNEL_SIGNING_KEY_FILE
              value: /var/run/anydesign/signer/private.der
            - name: WORKSPACE_CHANNEL_TLS_MODE
              value: required
            - name: WORKSPACE_CHANNEL_CA_FILE
              value: /var/run/anydesign/workspace-channel-tls/ca.crt
            - name: WORKSPACE_CHANNEL_CLIENT_CERT_FILE
              value: /var/run/anydesign/workspace-channel-tls/tls.crt
            - name: WORKSPACE_CHANNEL_CLIENT_KEY_FILE
              value: /var/run/anydesign/workspace-channel-tls/tls.key
            - name: WORKSPACE_CHANNEL_SERVER_SAN
              value: spiffe://anydesign.local/ns/{namespace}/sa/anydesign-sandbox
            - name: RUNTIME_NPM_REGISTRY
              value: http://anydesign-npm-proxy.anydesign-runtime.svc.cluster.local:4873/
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 2
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: storage
              mountPath: /var/lib/anydesign-runtime/data
            - name: signer
              mountPath: /var/run/anydesign/signer
              readOnly: true
            - name: workspace-channel-tls
              mountPath: /var/run/anydesign/workspace-channel-tls
              readOnly: true
            - name: public-principal
              mountPath: /var/run/anydesign/public-principal
              readOnly: true
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: anydesign-runtime-storage
        - name: signer
          secret:
            secretName: anydesign-workspace-channel-signer
        - name: workspace-channel-tls
          secret:
            secretName: anydesign-runtime-channel-client
        - name: public-principal
          secret:
            secretName: anydesign-runtime-public-principal
---
apiVersion: v1
kind: Service
metadata:
  name: anydesign-runtime
  namespace: anydesign-runtime
  labels:
    app: anydesign-runtime
    anydesign.io/runtime-role: primary
spec:
  selector:
    app: anydesign-runtime
    anydesign.io/runtime-role: primary
  ports:
    - name: http
      port: 8080
      targetPort: http
