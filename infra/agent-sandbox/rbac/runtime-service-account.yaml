apiVersion: v1
kind: Namespace
metadata:
  name: anydesign-runtime
---
apiVersion: v1
kind: Namespace
metadata:
  name: anydesign-sandboxes
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: anydesign-runtime
  namespace: anydesign-runtime
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: anydesign-sandbox
  namespace: anydesign-sandboxes
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: anydesign-runtime-sandbox-claims
  namespace: anydesign-sandboxes
rules:
  - apiGroups:
      - extensions.agents.x-k8s.io
    resources:
      - sandboxclaims
    verbs:
      - create
      - get
      - list
      - watch
      - delete
  - apiGroups:
      - agents.x-k8s.io
    resources:
      - sandboxes
      - sandboxtemplates
      - sandboxwarmpools
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - endpoints
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: anydesign-runtime-sandbox-claims
  namespace: anydesign-sandboxes
subjects:
  - kind: ServiceAccount
    name: anydesign-runtime
    namespace: anydesign-runtime
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: anydesign-runtime-sandbox-claims
