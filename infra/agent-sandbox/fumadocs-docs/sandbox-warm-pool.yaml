apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxWarmPool
metadata:
  name: anydesign-fumadocs-docs-pool
  namespace: anydesign-sandboxes
spec:
  # v1beta1 SandboxClaim requires a pool reference. Zero replicas keeps this as
  # template indirection without a resident pre-warmed Sandbox.
  replicas: 0
  sandboxTemplateRef:
    name: anydesign-fumadocs-docs
