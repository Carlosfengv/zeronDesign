apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxTemplate
metadata:
  name: anydesign-fumadocs-docs
  namespace: anydesign-sandboxes
spec:
  # The repository-owned NetworkPolicies are the only egress authority. The
  # controller's Managed default adds a public-internet allow policy.
  networkPolicyManagement: Unmanaged
  podTemplate:
    spec:
      serviceAccountName: anydesign-sandbox
      dnsPolicy: ClusterFirst
      containers:
        - name: fumadocs-docs
          image: ghcr.io/carlosfengv/zerondesign/astro-website-sandbox:0.1.0
          env:
            - name: WORKSPACE_CHANNEL_PORT
              value: "3001"
            - name: CANDIDATE_PREVIEW_PORT
              value: "4321"
            - name: WORKSPACE_CHANNEL_AUTH_MODE
              value: required
            - name: WORKSPACE_CHANNEL_TLS_MODE
              value: required
            - name: WORKSPACE_CHANNEL_CA_FILE
              value: /var/run/anydesign/workspace-channel-tls/ca.crt
            - name: WORKSPACE_CHANNEL_CERT_FILE
              value: /var/run/anydesign/workspace-channel-tls/tls.crt
            - name: WORKSPACE_CHANNEL_KEY_FILE
              value: /var/run/anydesign/workspace-channel-tls/tls.key
            - name: WORKSPACE_CHANNEL_RUNTIME_SAN
              value: spiffe://anydesign.local/ns/anydesign-runtime/sa/anydesign-runtime
            - name: WORKSPACE_CHANNEL_PUBLIC_KEY_FILES
              value: /var/run/anydesign/workspace-channel/current.der,/var/run/anydesign/workspace-channel/previous.der
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          command:
            - /bin/sh
            - -lc
            - /opt/anydesign/bootstrap/workspace-init.sh && exec node /opt/anydesign/bootstrap/workspace-channel-server.js
          ports:
            - name: workspace
              containerPort: 3001
            - name: preview
              containerPort: 4321
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: workspace-channel-verifier
              mountPath: /var/run/anydesign/workspace-channel
              readOnly: true
            - name: workspace-channel-tls
              mountPath: /var/run/anydesign/workspace-channel-tls
              readOnly: true
      volumes:
        - name: workspace-channel-verifier
          configMap:
            name: anydesign-workspace-channel-verifier
        - name: workspace-channel-tls
          secret:
            secretName: anydesign-sandbox-channel-server
      restartPolicy: OnFailure
  service: true
  volumeClaimTemplates:
    - metadata:
        name: workspace
        labels:
          anydesign.dev/workspace-scope: sandbox-pvc
        annotations:
          anydesign.dev/workspace-scope: sandbox+pvc
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
  volumeClaimTemplatesPolicy: Allowed
