apiVersion: apps/v1
kind: Deployment
metadata:
  name: anydesign-npm-proxy
  namespace: anydesign-runtime
  labels:
    app.kubernetes.io/name: anydesign-npm-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: anydesign-npm-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: anydesign-npm-proxy
    spec:
      containers:
        - name: verdaccio
          image: verdaccio/verdaccio:6.1.6@sha256:44af8dec4b8bfb9b940263f56ee5f371484515e4397eea56ab9c942500ab9dfa
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_OPTIONS
              value: --max-old-space-size=768
          ports:
            - name: npm
              containerPort: 4873
          readinessProbe:
            httpGet:
              path: /-/ping
              port: npm
            initialDelaySeconds: 3
            periodSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /verdaccio/conf/config.yaml
              subPath: config.yaml
            - name: storage
              mountPath: /verdaccio/storage
      volumes:
        - name: config
          configMap:
            name: anydesign-npm-proxy-config
        - name: storage
          emptyDir: {}
