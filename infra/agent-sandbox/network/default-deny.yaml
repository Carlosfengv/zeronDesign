apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: anydesign-sandbox-default-deny
  namespace: anydesign-sandboxes
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: anydesign-sandbox-allow-runtime-channel
  namespace: anydesign-sandboxes
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: anydesign-runtime
      ports:
        - protocol: TCP
          port: 3001
        - protocol: TCP
          port: 4321
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: anydesign-sandbox-allow-dns-egress
  namespace: anydesign-sandboxes
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: anydesign-sandbox-allow-npm-proxy-egress
  namespace: anydesign-sandboxes
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: anydesign-runtime
          podSelector:
            matchLabels:
              app.kubernetes.io/name: anydesign-npm-proxy
      ports:
        - protocol: TCP
          port: 4873
