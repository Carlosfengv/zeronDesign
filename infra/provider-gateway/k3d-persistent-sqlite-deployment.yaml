apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-gateway
  namespace: provider-system
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: provider-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: provider-gateway
    spec:
      serviceAccountName: provider-gateway
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: provider-gateway
          image: zerondesign/provider-gateway:k3d-local
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 9000
          env:
            - name: PROVIDER_GATEWAY_LISTEN
              value: 0.0.0.0:9000
            - name: PROVIDER_GATEWAY_CONFIG_FILE
              value: /etc/provider-gateway/model-resources.json
            - name: PROVIDER_GATEWAY_DATABASE_URL
              value: sqlite:/var/lib/provider-gateway/gateway.db
            - name: PROVIDER_GATEWAY_RUNTIME_TOKEN_FILE
              value: /var/run/secrets/provider-gateway-runtime-auth/MODEL_GATEWAY_AUTH_TOKEN
            - name: PROVIDER_GATEWAY_ADMIN_TOKEN_FILE
              value: /var/run/secrets/provider-gateway-admin-auth/token
          volumeMounts:
            - name: config
              mountPath: /etc/provider-gateway
              readOnly: true
            - name: deepseek-api
              mountPath: /var/run/secrets/deepseek
              readOnly: true
            - name: runtime-auth
              mountPath: /var/run/secrets/provider-gateway-runtime-auth
              readOnly: true
            - name: admin-auth
              mountPath: /var/run/secrets/provider-gateway-admin-auth
              readOnly: true
            - name: data
              mountPath: /var/lib/provider-gateway
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: provider-gateway-model-resources
        - name: deepseek-api
          secret:
            secretName: deepseek-v4-pro-api
        - name: runtime-auth
          secret:
            secretName: provider-gateway-runtime-auth
        - name: admin-auth
          secret:
            secretName: provider-gateway-admin-auth
        - name: data
          persistentVolumeClaim:
            claimName: provider-gateway-sqlite
