apiVersion: v1
kind: ServiceAccount
metadata:
  name: provider-gateway
  namespace: provider-system
---
# Bind this account only to the GitOps reconciler/Admin workload; it has no
# Kubernetes RBAC by itself. The mTLS AuthorizationPolicy identifies it before
# Gateway applies the admin bearer and audit requirements.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: provider-gateway-admin
  namespace: provider-system
