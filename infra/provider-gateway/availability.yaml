apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: provider-gateway
  namespace: provider-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: provider-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: provider-gateway
  namespace: provider-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: provider-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
