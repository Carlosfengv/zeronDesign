server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Next.js static exports emit /docs as docs.html while their canonical
    # browser entry remains /docs/. Keep that public route stable.
    location = /docs/ {
        try_files /docs.html =404;
    }

    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }
}
