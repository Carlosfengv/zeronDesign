apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - generation-context-servicemonitor.yaml
configMapGenerator:
  - name: generation-context-dashboard
    files:
      - generation-context-dashboard.json
    options:
      labels:
        grafana_dashboard: "1"
generatorOptions:
  disableNameSuffixHash: true
